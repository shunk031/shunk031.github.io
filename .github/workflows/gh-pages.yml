name: Page Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-typo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Typo check
        uses: crate-ci/typos@v1.48.0

  build:
    needs: check-typo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Build Environment
        uses: jdx/mise-action@v4

      - name: Build
        shell: bash
        run: hugo --printUnusedTemplates 2>&1 | tee /tmp/hugo-build.log

      # Fail if Hugo reports templates under this repository's layouts/ as
      # unused (dead code). Templates provided by theme modules are ignored
      # since their source files live outside the workspace.
      - name: Check for unused local templates
        run: |
          if grep "is unused, source file ${GITHUB_WORKSPACE}/layouts/" /tmp/hugo-build.log; then
            echo "::error::Unused template(s) detected under layouts/. Remove the dead template(s) listed above or reference them."
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.ARTIFACT_NAME }}
          path: ${{ vars.ARTIFACT_PATH }}

  check-broken-links:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository to access the lychee config file
      - uses: actions/checkout@v7

      # Keep mise.toml as the single source of truth for the lychee version
      - name: Read lychee version from mise.toml
        id: lychee-version
        run: |
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("mise.toml", "rb"))["tools"]["lychee"])')"
          echo "version=v${version}" >> "$GITHUB_OUTPUT"

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ vars.ARTIFACT_NAME }}
          path: ${{ vars.ARTIFACT_PATH }}

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          lycheeVersion: ${{ steps.lychee-version.outputs.version }}
          # --root-dir is required to resolve root-relative links (e.g. /talk/...)
          # in the built HTML; without it lychee silently skips them.
          args: "${{ vars.ARTIFACT_PATH }} --root-dir ${{ github.workspace }}/${{ vars.ARTIFACT_PATH }} --config .lychee/config.toml --exclude-file .lychee/exclude-temporary.txt --exclude-file .lychee/exclude-permanent.txt"

  deploy:
    needs: [build, check-broken-links]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ vars.ARTIFACT_NAME }}
          path: ${{ vars.ARTIFACT_PATH }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ${{ vars.ARTIFACT_PATH }}
          publish_branch: gh-pages # deploying branch
          cname: ${{ vars.CNAME }}
